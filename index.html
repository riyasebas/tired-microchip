<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atomicwork</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      background: linear-gradient(165deg, #F4E4FF 0%, #DAD2FF 30%, #FFEBF7 60%, #FFF 100%);
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: linear-gradient(25deg, #4F1F72 4.07%, #702EA3 25.38%, #160820 96.71%);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    header .logo {
      width: 36px; height: 36px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 1.1rem;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #ffffff;
    }

    main {
      max-width: 720px;
      width: 100%;
      margin: 3rem auto;
      padding: 0 1.5rem;
    }

    .welcome {
      margin-bottom: 2.5rem;
    }

    .welcome h2 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #160820;
    }

    .welcome p {
      color: #555;
      font-size: 1.05rem;
      line-height: 1.5;
    }

    .folder-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }

    .folder-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(131, 110, 216, 0.15);
      border-radius: 12px;
      padding: 1.5rem;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.2s, transform 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .folder-card:hover {
      box-shadow: 0 6px 24px rgba(79, 31, 114, 0.12);
      transform: translateY(-2px);
      border-color: rgba(131, 110, 216, 0.3);
    }

    .folder-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #F4E4FF, #DAD2FF);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
    }

    .folder-icon svg {
      width: 28px; height: 28px;
      color: #702EA3;
    }

    .folder-card span {
      font-weight: 600;
      font-size: 1rem;
      color: #160820;
    }

    footer {
      margin-top: auto;
      text-align: center;
      padding: 1.5rem;
      color: #836ED8;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">A</div>
    <h1>Atomicwork</h1>
  </header>

  <main>
    <div class="welcome">
      <h2>Resources</h2>
      <p>Browse available resources below.</p>
    </div>

    <div class="folder-grid">
      <a href="Training/" class="folder-card">
        <div class="folder-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.438 60.438 0 0 0-.491 6.347A48.62 48.62 0 0 1 12 20.904a48.62 48.62 0 0 1 8.232-4.41 60.46 60.46 0 0 0-.491-6.347m-15.482 0a50.636 50.636 0 0 0-2.658-.813A59.906 59.906 0 0 1 12 3.493a59.903 59.903 0 0 1 10.399 5.84c-.896.248-1.783.52-2.658.814m-15.482 0A50.717 50.717 0 0 1 12 13.489a50.702 50.702 0 0 1 7.74-3.342" />
          </svg>
        </div>
        <span>Training</span>
      </a>
    </div>
  </main>

  <footer>
    &copy; 2026 Atomicwork
  </footer>

</body>
</html>
